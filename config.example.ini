[Plex]
# URL to access your Plex Media Server
PLEX_URL = http://127.0.0.1:32400

# Plex API Access Token
PLEX_TOKEN = YOUR_PLEX_TOKEN_HERE

[Logging]
# Path to write the rotating log file. Leave empty to write only to the console.
LOG_FILE =

# Log level. Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
LOG_LEVEL = INFO

# Output logs to stdout (console) as well as the file (True/False)
# Useful when running inside docker container
LOG_TO_CONSOLE = True

[Cache]
# Command to execute for caching. {file_path} will be replaced automatically.
# Defaults to using our smart executor which implements gap-caching and dynamic throttling.
CACHE_COMMAND = python cache_executor.py --file {file_path}

# Dynamic speed limit in MB/s when active streams are playing on Plex.
# Prevents network/disk IO saturation from causing buffering to other users.
# Set to 0 to disable throttling and download at maximum speed.
THROTTLE_SPEED_ACTIVE_MB = 0.0

# Maximum capacity in Gigabytes (GB) of cache files allowed in the queue at once.
# Prevents caching new items if SSD cache space is constrained. Set to 0 to disable.
MAX_CACHE_TOTAL_GB = 0.0

# Minimum free space required on target cache drive in Gigabytes (GB)
MIN_FREE_SPACE_GB = 5.0

# Number of upcoming episodes to cache ahead
EPISODES_TO_CACHE = 1

# Only trigger caching once the user has watched this percentage of the current episode.
# Set to 0 to disable and trigger cache immediately upon playback start.
CACHE_START_THRESHOLD_PCT = 50

# Maximum number of caching processes allowed to run simultaneously.
MAX_CONCURRENT_CACHES = 1

# Comma-separated lists of Plex usernames/libraries to filter caching targets.
# Leave empty to disable filtering.
USER_WHITELIST = 
USER_BLACKLIST = 
LIBRARY_WHITELIST = 
LIBRARY_BLACKLIST = 

# Automatically pause caching when host CPU or Memory exceeds this percentage limit.
# Set to 0.0 to disable load-guard.
MAX_CPU_PERCENT_LIMIT = 0.0
MAX_MEM_PERCENT_LIMIT = 0.0

# Maximum number of completed/failed tasks to keep in history.
MAX_HISTORY_COUNT = 50

# Maximum age in days to keep completed tasks in history.
MAX_HISTORY_AGE_DAYS = 7.0


# Optional path mapping to translate paths from Plex to local client paths
# useful if Plex operates on different local mount names.
# e.g., if Plex reports "/data/media/TV/Show/..." but locally you see "/mnt/TV/Show/..."
PATH_MAP_FROM = 
PATH_MAP_TO = 

# Path to the local rclone VFS cache directory (e.g. /home/user/.cache/rclone)
RCLONE_CACHE_DIR = 

# Name of the rclone remote (e.g. altmount)
RCLONE_REMOTE_NAME = altmount 

# Local directory where rclone remote is mounted (e.g. /mnt/gdrive)
RCLONE_MOUNT_DIR = 


[Daemon]
# Set to True to render a beautiful real-time Terminal User Interface dashboard
TUI_MODE = False
